<!doctype html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
        <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>
        <style>
            /* 按鈕容器：讓聲音按鈕和簡介按鈕並排且固定在畫面下方中央 */
            .button-container {
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 9999;
                display: none;
                gap: 15px; /* 按鈕之間的間距 */
            }

            /* 共用按鈕樣式 */
            .action-btn {
                padding: 12px 24px;
                font-size: 20px;
                background-color: #ffffff;
                border: 2px solid #000000;
                border-radius: 8px;
                font-weight: bold;
                box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
                cursor: pointer;
            }

            /* 彈窗背景（預設隱藏） */
            .modal-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.5);
                z-index: 10000;
                justify-content: center;
                align-items: center;
            }

            /* 彈窗內容 */
            .modal-content {
                background-color: white;
                padding: 25px;
                border-radius: 12px;
                width: 80%;
                max-width: 300px;
                text-align: center;
                box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
            }

            /* 關閉按鈕樣式 */
            .close-btn {
                margin-top: 15px;
                padding: 8px 16px;
                background-color: #f0f0f0;
                border: 1px solid #ccc;
                border-radius: 6px;
                cursor: pointer;
            }
        </style>
    </head>

    <body style="margin: 0; overflow: hidden;">
        <audio id="myAudio" preload="auto">
            <source src="assets/1.mp3" type="audio/mpeg">
        </audio>
        <div class="button-container">
            <button id="playBtn" class="action-btn">
                雞叫
            </button>
            <button id="infoBtn" class="action-btn">
                簡介
            </button>
        </div>
        <div id="infoModal" class="modal-overlay">
            <div class="modal-content">
                <h3>雞隻簡介</h3>
                <p><a href="https://www.pec21c.com.tw/">>我是一隻可口的雞<br>了解更多</a></p>
                <button id="closeModal" class="close-btn">關閉</button>
            </div>
        </div>
        <a-scene
            vr-mode-ui="enabled: false;"
            loading-screen="enabled: false;"
            renderer="logarithmicDepthBuffer: true;"
            arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
            id="scene"
            embedded
            gesture-detector
        >
            <a-assets>
                <a-asset-item
                    id="animated-asset"
                    src="assets/asset.glb"
                ></a-asset-item>
            </a-assets>

            <a-marker
                id="animated-marker"
                type="pattern"
                preset="custom"
                url="assets/marker.patt"
                raycaster="objects: .clickable"
                emitevents="true"
                cursor="fuse: false; rayOrigin: mouse;"
                id="markerA"
            >
                <a-entity
                    id="bowser-model"
                    scale="0.2358353079902518 0.2358353079902518 0.2358353079902518"
                    animation-mixer="loop: repeat"
                    gltf-model="#animated-asset"
                    class="clickable"
                    gesture-handler
                ></a-entity>
            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>
        <script>
            // 控制簡介彈窗的顯示與隱藏
            const infoBtn = document.getElementById('infoBtn');
            const infoModal = document.getElementById('infoModal');
            const closeModal = document.getElementById('closeModal');

            infoBtn.addEventListener('click', () => {
                infoModal.style.display = 'flex'; // 顯示彈窗
            });

            closeModal.addEventListener('click', () => {
                infoModal.style.display = 'none'; // 隱藏彈窗
            });
            
            // 點擊彈窗以外的灰色半透明區域也可關閉
            infoModal.addEventListener('click', (e) => {
                if(e.target === infoModal) {
                    infoModal.style.display = 'none';
                }
            });
        </script>
        <script>
            const marker = document.getElementById('animated-marker');
            const button = document.getElementById('playBtn');
            const audio = document.getElementById('myAudio');

            // 1. 當相機「掃描到圖檔」：顯示按鈕
            marker.addEventListener('markerFound', function() {
                button.style.display = 'block';
            });

            // 2. 當相機「離開圖檔」：隱藏按鈕並暫停聲音（如果正在播的話）
            marker.addEventListener('markerLost', function() {
                button.style.display = 'none';
                audio.pause();
                audio.currentTime = 0; // 重設音訊時間到開頭
            });

            // 3. 使用者點擊按鈕：觸發播放
            button.addEventListener('click', function(e) {
                e.preventDefault(); 
                audio.play().then(function() {
                    console.log("播放成功");
                }).catch(function(error) {
                    alert("瀏覽器阻擋播放，請確保在 HTTPS 環境下開啟網頁。錯誤原因: " + error.message);
                });
            });
        </script>
    </body>
</html>
