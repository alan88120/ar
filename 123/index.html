<!doctype html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
        <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>
    </head>

    <body style="margin: 0; overflow: hidden;">
        
        <button id="playBtn" 
                style="display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; padding: 12px 24px; font-size: 20px; background-color: #ffffff; border: 2px solid #000000; border-radius: 8px; font-weight: bold; box-shadow: 0px 4px 6px rgba(0,0,0,0.1);">
            雞叫
        </button>
        <a-scene
            vr-mode-ui="enabled: false;"
            loading-screen="enabled: false;"
            renderer="logarithmicDepthBuffer: true;"
            arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
            id="scene"
            embedded
            gesture-detector
        >
            <a-assets>
                <a-asset-item
                    id="animated-asset"
                    src="assets/asset.glb"
                ></a-asset-item>

                <audio id="myAudio" src="assets/1.mp3" preload="auto"></audio>

                

            </a-assets>

            <a-marker
                id="animated-marker"
                type="pattern"
                preset="custom"
                url="assets/marker.patt"
                raycaster="objects: .clickable"
                emitevents="true"
                cursor="fuse: false; rayOrigin: mouse;"
                id="markerA"
            >
                <a-entity
                    id="bowser-model"
                    scale="0.2358353079902518 0.2358353079902518 0.2358353079902518"
                    animation-mixer="loop: repeat"
                    gltf-model="#animated-asset"
                    class="clickable"
                    gesture-handler
                ></a-entity>
            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>
        <script>
            const marker = document.getElementById('animated-marker');
            const button = document.getElementById('playBtn');
            const cameraEntity = document.getElementById('myCamera');

            // 1. 掃描到圖檔：顯示按鈕
            marker.addEventListener('markerFound', function() {
                button.style.display = 'block';
            });

            // 2. 離開圖檔：隱藏按鈕並強制停止聲音
            marker.addEventListener('markerLost', function() {
                button.style.display = 'none';
                if (cameraEntity.components.sound) {
                    cameraEntity.components.sound.stopSound();
                }
            });

            // 3. 處理播放核心（相容 click 與手機端的 touchend）
            function handlePlay(e) {
                e.preventDefault();
                e.stopPropagation();

                // 呼叫 A-Frame 音訊組件的 playSound 方法
                if (cameraEntity.components.sound) {
                    cameraEntity.components.sound.playSound();
                    console.log("A-Frame 內建音訊播放指令已發送");
                } else {
                    alert("音訊元件尚未準備就緒，請重試");
                }
            }

            // 同時監聽兩種點擊事件，徹底解決手機網頁點擊不反應的問題
            button.addEventListener('click', handlePlay);
            button.addEventListener('touchend', handlePlay);
        </script>
    </body>
</html>
