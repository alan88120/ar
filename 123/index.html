<html>
    <head>
        <script src="https://aframe.io"></script>
        <script src="https://githack.com"></script>
        <script src="https://githack.com"></script>
        <script src="https://githack.com"></script>
        <script src="https://githack.com"></script>

        <style>
            /* 1. 聲音按鈕的樣式設計 */
            .ui-container {
                position: absolute;
                bottom: 40px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 9999; /* 確保按鈕蓋在相機畫面上層 */
                display: none; /* 初始隱藏，掃到圖案後才會顯示 */
            }
            .sound-btn {
                padding: 15px 35px;
                font-size: 18px;
                font-weight: bold;
                background-color: #1e90ff;
                color: white;
                border: none;
                border-radius: 50px;
                box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
                cursor: pointer;
            }
            .sound-btn:active {
                transform: scale(0.95);
            }
        </style>
    </head>

    <body style="margin: 0; overflow: hidden;">

        <!-- 2. HTML 聲音按鈕（預設隱藏） -->
        <div class="ui-container" id="btn-area">
            <button class="sound-btn" onclick="playSound()">🎵 播放音效</button>
        </div>

        <!-- 3. AR 場景（已修正先前所有的語法錯誤與相機放大問題） -->
        <a-scene
            vr-mode-ui="enabled: false;"
            loading-screen="enabled: false;"
            renderer="logarithmicDepthBuffer: true;"
            embedded
            arjs="trackingMethod: best; sourceType: webcam; sourceWidth:1280; sourceHeight:720; displayWidth: 1280; displayHeight: 720; debugUIEnabled: false;"
            id="scene"
            gesture-detector
        >
            <a-assets>
                <!-- 3D 模型資源 -->
                <a-asset-item
                    id="animated-asset"
                    src="assets/asset.glb"
                ></a-asset-item>

                <!-- 音訊資源：請確保路徑正確（例如放在 assets 資料夾下叫 sound.mp3） -->
                <audio id="my-audio" src="assets/sound.mp3" preload="auto"></audio>
            </a-assets>

            <!-- 加上偵測 Marker 狀態的自訂組件 marker-status -->
            <a-marker
                id="animated-marker"
                type="pattern"
                preset="custom"
                url="assets/marker.patt"
                raycaster="objects: .clickable"
                emitevents="true"
                cursor="fuse: false; rayOrigin: mouse;"
                marker-status
            >
                
            </a-marker>

            
        </a-scene>

        <!-- 4. JavaScript 控制邏輯 -->
        <script>
            var btnArea = document.querySelector('#btn-area');
            var audio = document.querySelector('#my-audio');

            // 註冊 A-Frame 組件來監聽「掃描圖案」的狀態
            AFRAME.registerComponent('marker-status', {
                init: function () {
                    var marker = this.el;

                    // 當手機「掃到圖案」時：顯示按鈕
                    marker.addEventListener('markerFound', function() {
                        btnArea.style.display = 'block';
                    });

                    // 当手機「移開圖案」時：隱藏按鈕、暫停聲音並重置
                    marker.addEventListener('markerLost', function() {
                        btnArea.style.display = 'none';
                        audio.pause();
                        audio.currentTime = 0; 
                    });
                }
            });

            // 按下按鈕時觸發的播放功能
            function playSound() {
                audio.play().catch(function(error) {
                    console.log("播放失敗:", error);
                });
            }
        </script>
    </body>
</html>
