<!doctype html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
        <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>
    </head>

    <body style="margin: 0; overflow: hidden;">
        <audio id="myAudio" preload="auto">
            <source src="assets/1.mp3" type="audio/mpeg">
        </audio>
        <button id="playBtn" 
                style="display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; padding: 12px 24px; font-size: 20px; background-color: #ffffff; border: 2px solid #000000; border-radius: 8px; font-weight: bold; box-shadow: 0px 4px 6px rgba(0,0,0,0.1);">
            雞叫
        </button>
        <a-scene
            vr-mode-ui="enabled: false;"
            loading-screen="enabled: false;"
            renderer="logarithmicDepthBuffer: true;"
            arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
            id="scene"
            embedded
            gesture-detector
        >
            <a-assets>
                <a-asset-item
                    id="animated-asset"
                    src="assets/asset.glb"
                ></a-asset-item>
            </a-assets>

            <a-marker
                id="animated-marker"
                type="pattern"
                preset="custom"
                url="assets/marker.patt"
                raycaster="objects: .clickable"
                emitevents="true"
                cursor="fuse: false; rayOrigin: mouse;"
                id="markerA"
            >
                <a-entity
                    id="bowser-model"
                    scale="0.2358353079902518 0.2358353079902518 0.2358353079902518"
                    animation-mixer="loop: repeat"
                    gltf-model="#animated-asset"
                    class="clickable"
                    gesture-handler
                ></a-entity>
            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>
        <script>
            const marker = document.getElementById('animated-marker');
            const button = document.getElementById('playBtn');
            const audio = document.getElementById('myAudio');

            // 1. 當相機「掃描到圖檔」：顯示按鈕
            marker.addEventListener('markerFound', function() {
                button.style.display = 'block';
            });

            // 2. 當相機「離開圖檔」：隱藏按鈕並暫停聲音（如果正在播的話）
            marker.addEventListener('markerLost', function() {
                button.style.display = 'none';
                audio.pause();
                audio.currentTime = 0; // 重設音訊時間到開頭
            });

            // 3. 使用者點擊按鈕：觸發播放
            button.addEventListener('click', function(e) {
                e.preventDefault(); 
                audio.play().then(function() {
                    console.log("播放成功");
                }).catch(function(error) {
                    alert("瀏覽器阻擋播放，請確保在 HTTPS 環境下開啟網頁。錯誤原因: " + error.message);
                });
            });
        </script>
    </body>
</html>
